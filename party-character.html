<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party Characters</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="app.js"></script>
</head>
<body data-page="party">
  <header class="app-header">
    <div class="app-header-inner">
      <div class="brand-block">
        <p class="eyebrow">Campaign Companion</p>
        <h1 class="app-title">Party Character Sheets</h1>
      </div>

      <nav class="top-nav" aria-label="Primary">
        <a class="nav-link" data-nav="party" href="party-character.html">Party</a>
        <a class="nav-link" data-nav="characters" href="characters.html">Characters</a>
        <a class="nav-link" data-nav="campaign" href="campaign-notes.html">Campaign Notes</a>
        <a class="nav-link" data-nav="combat" href="combat-rules.html">Combat Rules</a>
      </nav>

      
<div class="selector-block">
  <label for="characterSelect">Party Member</label>
  <select id="characterSelect"></select>
</div>

    </div>
  </header>

  <main class="page">
    <section id="appError" class="error-wrap" hidden></section>
    
<section class="sheet" id="sheet">
  <header class="sheet-header">
    <div class="title-column">
      <div>
        <p class="eyebrow">Character Sheet</p>
        <h2 id="name">Loading...</h2>
        <p class="subtitle">
          <span id="role"></span>
          <span id="raceWrap" class="muted"></span>
        </p>
      </div>

      <div class="vitals-row">
        <div class="vital-card">
          <span class="vital-label">Health</span>
          <strong id="health">—</strong>
        </div>
        <div class="vital-card">
          <span class="vital-label">Armour</span>
          <strong id="armour">—</strong>
        </div>
      </div>
    </div>

    <aside class="portrait-card">
      <img id="portrait" src="images/stub-portrait.png" alt="Character portrait" />
    </aside>
  </header>

  <section class="grid two-up">
    <article class="card" data-section="attributes">
      <h3>Attributes</h3>
      <div class="attribute-grid" id="attributeCards"></div>
    </article>

    <article class="card" data-section="combatNotes">
      <h3>Combat Notes</h3>
      <div class="list-block" id="combatNotes"></div>
    </article>
  </section>

  <section class="grid two-up">
    <article class="card" data-section="skills">
      <h3>Skills</h3>
      <div id="skills"></div>
    </article>

    <article class="card" data-section="inventory">
      <h3>Inventory</h3>
      <div id="inventory"></div>
    </article>
  </section>

  <section class="grid two-up">
    <article class="card" data-section="resources">
      <h3>Currency & Resources</h3>
      <div id="resources"></div>
    </article>

    <article class="card" data-section="notes">
      <h3>Notes</h3>
      <div class="list-block" id="notes"></div>
    </article>
  </section>

  <section class="grid">
    <article class="card" data-section="backstory">
      <h3>Backstory Details</h3>
      <div class="list-block" id="backstory"></div>
    </article>
  </section>
</section>

  </main>
</body>
</html>
